<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sharia Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8;}
.sidebar {width:220px;height:100vh;background:#134e4a;position:fixed;color:white;}
.sidebar a {display:block;padding:12px;color:white;text-decoration:none;}
.sidebar a:hover {background:#0f766e;}
.main {margin-left:220px;padding:20px;}
.card {background:white;padding:20px;margin:10px;border-radius:10px;}
.ai-box {position:fixed;right:20px;bottom:20px;width:250px;background:white;border-radius:10px;}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
  <h3 style="text-align:center;">Menu</h3>
  <a onclick="showPage('overview')">Overview</a>
  <a onclick="showPage('mudharabah')">Mudharabah</a>
  <a onclick="showPage('zakat')">Zakat</a>
  <a onclick="showPage('audit')">Audit</a>
  <a onclick="showPage('settings')">Settings</a>
</div>

<div class="main">

<!-- OVERVIEW -->
<div id="overview">
  <h2>Dashboard</h2>
  <div class="card">Assets: Rp 10M</div>
  <canvas id="chart"></canvas>
</div>

<!-- PAGE -->
<div id="mudharabah" style="display:none;"><h2>Mudharabah Page</h2></div>
<div id="zakat" style="display:none;"><h2>Zakat Page</h2></div>
<div id="audit" style="display:none;"><h2>Audit Page</h2></div>
<div id="settings" style="display:none;"><h2>Settings Page</h2></div>

</div>

<!-- AI -->
<div class="ai-box">
  <input id="input">
  <button onclick="chat()">Send</button>
  <div id="chat"></div>
</div>

<script>

// NAVIGATION FIX (SUPER STABIL)
function showPage(page){
  let pages = ["overview","mudharabah","zakat","audit","settings"];
  for(let i=0;i<pages.length;i++){
    document.getElementById(pages[i]).style.display="none";
  }
  document.getElementById(page).style.display="block";
}

// DEFAULT PAGE
showPage("overview");

// CHART
new Chart(document.getElementById("chart"), {
  type:'line',
  data:{
    labels:["Jan","Feb","Mar"],
    datasets:[{data:[10,20,30]}]
  }
});

// AI
function chat(){
  let val = document.getElementById("input").value;
  document.getElementById("chat").innerHTML += "<p>"+val+"</p>";
}

</script>

</body>
</html>
